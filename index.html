<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="description" content="帮你解决回忆每周工作项的难题，管理待办和写周报一站式解决" />
  <title>AI周报与待办-轻松完成日程，轻松整理日报/周报</title>
  <link rel="icon" href="favicon.png" type="image/png" />
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#C85D3A" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&family=Noto+Sans+SC:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    /* ── Variables ── */
    :root {
      --bg:        #F2EDE4;
      --surface:   #FDFAF5;
      --border:    #DDD5C8;
      --ink:       #1C1714;
      --ink-2:     #6B5F53;
      --ink-3:     #A8998A;
      --accent:    #C85D3A;
      --accent-bg: #FDF0EB;
      --done:      #B0A396;
      --green:     #3A7A5A;
      --radius:    10px;
      --shadow:    0 1px 6px rgba(28,23,20,.06), 0 4px 16px rgba(28,23,20,.04);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Noto Sans SC', sans-serif;
      background: var(--bg);
      color: var(--ink);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ── Full-width topbar ── */
    .topbar-outer {
      width: 100%;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
    }
    .topbar-inner {
      max-width: 1500px;
      margin: 0 auto;
      padding: 0 48px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 72px;
    }
    .app-brand {
      display: flex;
      align-items: center;
      gap: 14px;
    }
    .app-name {
      font-family: 'Noto Serif SC', serif;
      font-size: 24px;
      font-weight: 700;
      color: var(--ink);
      letter-spacing: -.4px;
    }
    .brand-sep {
      width: 1px;
      height: 16px;
      background: var(--border);
    }
    .app-desc {
      font-size: 13px;
      color: var(--ink-3);
    }
    .app-today {
      display: flex;
      align-items: center;
      gap: 20px;
    }
    .today-day {
      font-family: 'Noto Serif SC', serif;
      font-size: 28px;
      font-weight: 700;
      color: var(--ink);
      line-height: 1;
    }
    .today-meta {
      font-size: 13px;
      color: var(--ink-2);
      line-height: 1.55;
    }

    /* ── Layout ── */
    .app {
      max-width: 1500px;
      margin: 0 auto;
      padding: 28px 48px 60px;
    }

    /* ── Horizontal week strip (top) ── */
    .week-strip-wrap {
      margin-bottom: 24px;
      padding-bottom: 16px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .week-nav-arrow {
      flex-shrink: 0;
      background: none;
      border: none;
      color: var(--ink-3);
      font-size: 18px;
      cursor: pointer;
      padding: 4px 2px;
      line-height: 1;
      transition: color .15s;
    }
    .week-nav-arrow:hover { color: var(--ink); }
    .week-nav-arrow:disabled { opacity: .3; cursor: not-allowed; }
    .week-strip-inner {
      flex: 1;
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 4px;
    }
    .ws-item {
      text-align: center;
      padding: 6px 4px 5px;
      border-radius: 6px;
      cursor: pointer;
      border: 1px solid transparent;
      background: transparent;
      transition: all .15s;
    }
    .ws-item:hover { background: var(--border); }
    .ws-item.is-today { border-color: var(--border); }
    .ws-item.is-viewing { background: #fff; border-color: var(--border); }
    .ws-name { font-size: 10px; color: var(--ink-3); display: block; }
    .ws-item.is-viewing .ws-name { color: var(--ink-2); }
    .ws-num { font-size: 14px; font-weight: 600; color: var(--ink); line-height: 1.4; display: block; }
    .ws-item.is-viewing .ws-num { color: var(--ink); }
    .ws-cnt {
      display: inline-block;
      margin-top: 2px;
      font-size: 10px;
      color: var(--ink-3);
    }
    .ws-item.has-tasks .ws-cnt { color: var(--accent); font-weight: 500; }
    .ws-item.is-viewing .ws-cnt { color: var(--ink-2); }
    .ws-item.is-viewing.has-tasks .ws-cnt { color: var(--accent); font-weight: 500; }

    /* ── Two-column body ── */
    .app-body {
      display: grid;
      grid-template-columns: 1.5fr 1fr;
      gap: 0;
      align-items: start;
    }

    /* ── Left column: tasks ── */
    .col-left {
      padding-right: 52px;
      position: sticky;
      top: 28px;
    }

    /* ── Right column: reports ── */
    .col-right {
      padding-left: 52px;
      border-left: 1px solid var(--border);
    }

    /* ── Section label (replaces card-label) ── */
    .sec-label {
      font-size: 11px;
      font-weight: 500;
      letter-spacing: .1em;
      text-transform: uppercase;
      color: var(--ink-3);
      margin-bottom: 16px;
    }
    .sec-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }
    /* keep .card-label for task area compat */
    .card-label {
      font-size: 11px;
      font-weight: 500;
      letter-spacing: .1em;
      text-transform: uppercase;
      color: var(--ink-3);
    }
    .card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 18px;
    }

    /* ── Report sections ── */
    .report-section {
      padding-bottom: 36px;
    }
    .report-section + .report-section {
      padding-top: 32px;
      border-top: 1px solid var(--border);
    }
    .rs-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 16px;
    }
    .rs-info { flex: 1; }
    .report-type-tabs {
      display: inline-flex;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 2px;
      gap: 0;
    }
    .report-tab {
      padding: 8px 20px;
      border: none;
      border-radius: 6px;
      font-size: 15px;
      font-family: 'Noto Sans SC', sans-serif;
      font-weight: 500;
      color: var(--ink-3);
      background: transparent;
      cursor: pointer;
      transition: all .15s;
    }
    .report-tab:hover { color: var(--ink-2); }
    .report-tab.active {
      background: var(--surface);
      color: var(--ink);
      box-shadow: 0 1px 3px rgba(0,0,0,.06);
    }
    .rs-meta-wrap { margin-top: 12px; }
    .rs-title {
      font-family: 'Noto Serif SC', serif;
      font-size: 18px;
      font-weight: 700;
      color: var(--ink);
      line-height: 1.2;
      margin-bottom: 5px;
    }
    .rs-meta {
      font-size: 13px;
      color: var(--ink-3);
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .rs-meta .week-nav-btn {
      background: none;
      border: none;
      color: var(--ink-3);
      font-size: 15px;
      cursor: pointer;
      padding: 0 2px;
      line-height: 1;
      transition: color .15s;
    }
    .rs-meta .week-nav-btn:hover { color: var(--ink); }
    .rs-meta .week-nav-btn:disabled { opacity: .3; cursor: not-allowed; }
    .rs-gen-btn {
      flex-shrink: 0;
      padding: 8px 18px;
      border: none;
      border-radius: 6px;
      background: var(--accent);
      color: #fff;
      font-size: 13px;
      font-family: 'Noto Sans SC', sans-serif;
      font-weight: 500;
      cursor: pointer;
      transition: background .15s, opacity .15s;
      white-space: nowrap;
    }
    .rs-gen-btn:hover { background: #b05130; }
    .rs-gen-btn:disabled { opacity: .5; cursor: not-allowed; }
    .rs-output .error-box { margin-top: 0; }
    .rs-output .report-footer { margin-top: 12px; }

    /* placeholder lines */
    .rs-placeholder {
      display: flex;
      flex-direction: column;
      gap: 16px;
      padding: 4px 0 6px;
    }
    .rs-placeholder-line {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .rs-placeholder-line .pl-num {
      font-size: 13px;
      color: #D4CBBf;
      font-weight: 500;
      width: 16px;
      flex-shrink: 0;
    }
    .rs-placeholder-line .pl-bar {
      height: 1.5px;
      border-radius: 2px;
      background: #E0D8CF;
    }

    /* ── Date nav ── */
    .date-nav {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 16px;
    }
    .nav-btn {
      background: none;
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 5px 11px;
      font-size: 13px;
      font-family: 'Noto Sans SC', sans-serif;
      color: var(--ink-2);
      cursor: pointer;
      transition: all .15s;
      white-space: nowrap;
    }
    .nav-btn:hover { background: var(--bg); border-color: var(--ink-3); }
    .nav-btn.accent-btn {
      color: var(--accent);
      border-color: currentColor;
      font-size: 12px;
    }
    .nav-btn.accent-btn:hover { background: var(--accent-bg); }
    .nav-btn:disabled { opacity: .4; cursor: not-allowed; }
    .nav-center {
      flex: 1;
      text-align: center;
      font-size: 14px;
      font-weight: 500;
      color: var(--ink);
    }

    /* ── Add task ── */
    .add-row {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
    }
    .task-input {
      flex: 1;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      padding: 10px 13px;
      font-size: 14px;
      font-family: 'Noto Sans SC', sans-serif;
      color: var(--ink);
      background: var(--bg);
      outline: none;
      transition: border-color .15s, background .15s;
    }
    .task-input::placeholder { color: var(--ink-3); }
    .task-input:focus { border-color: var(--accent); background: #fff; }
    .add-btn {
      width: 42px;
      height: 42px;
      border: none;
      border-radius: 8px;
      background: var(--accent);
      color: #fff;
      font-size: 22px;
      cursor: pointer;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background .15s, transform .1s;
    }
    .add-btn:hover { background: #b05130; }
    .add-btn:active { transform: scale(.92); }

    /* ── Task table ── */
    .task-table-wrap {
      overflow-x: auto;
      scrollbar-width: none;
      -ms-overflow-style: none;
    }
    .task-table-wrap::-webkit-scrollbar { display: none; }
    .task-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 14px;
    }
    .task-table th,
    .task-table td {
      padding: 12px 14px;
      border-top: 1px solid var(--border);
      border-bottom: 1px solid var(--border);
      border-left: 1px solid var(--border);
      border-right: 1px solid var(--border);
      text-align: left;
      vertical-align: middle;
    }
    .task-table thead th {
      background: var(--bg);
      color: var(--ink-2);
      font-weight: 500;
      font-size: 12px;
    }
    .task-table .col-num { width: 44px; text-align: center; color: var(--ink-3); font-size: 13px; border-left: none; }
    .task-table .col-task { min-width: 180px; }
    .task-table .col-task .task-cell-inner { display: flex; align-items: center; gap: 11px; }
    .task-table .col-task .task-cell-inner .task-text,
    .task-table .col-task .task-cell-inner .task-edit-input { flex: 1; min-width: 0; }
    .task-table .col-progress { width: 100px; }
    .task-table .col-worktype { width: 120px; border-right: none; white-space: nowrap; }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(-5px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes dropdownExpand {
      from { opacity: 0; transform: scaleY(0.85); }
      to   { opacity: 1; transform: scaleY(1); }
    }

    .task-check {
      position: relative;
      width: 20px;
      height: 20px;
      flex-shrink: 0;
    }
    .task-check input[type="checkbox"] {
      position: absolute;
      opacity: 0;
      width: 0; height: 0;
    }
    .check-box {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 20px;
      height: 20px;
      border: 1.5px solid var(--border);
      border-radius: 5px;
      background: #fff;
      cursor: pointer;
      transition: all .15s;
    }
    .task-check input:checked ~ .check-box {
      background: var(--green);
      border-color: var(--green);
    }
    .check-box svg { opacity: 0; transform: scale(.5); transition: all .15s; }
    .task-check input:checked ~ .check-box svg { opacity: 1; transform: scale(1); }
    .check-box:hover { border-color: var(--ink-3); }

    .task-text {
      flex: 1;
      font-size: 14px;
      line-height: 1.45;
      color: var(--ink);
      transition: color .15s;
    }
    .task-text.done { text-decoration: line-through; color: var(--done); }

    .del-btn {
      opacity: 0;
      background: none;
      border: none;
      color: var(--ink-3);
      font-size: 17px;
      line-height: 1;
      cursor: pointer;
      padding: 2px 5px;
      border-radius: 4px;
      flex-shrink: 0;
      transition: all .15s;
    }
    .task-table tbody tr:hover .del-btn { opacity: 1; }
    .del-btn:hover { color: var(--accent); background: var(--accent-bg); }

    /* task progress - pill button + dropdown */
    .task-progress-wrap {
      position: relative;
      flex-shrink: 0;
      transition: opacity .15s;
    }
    .task-table tbody tr .task-progress-wrap { opacity: 0; pointer-events: none; }
    .task-table tbody tr:hover .task-progress-wrap,
    .task-table tbody tr.task-progress-selected .task-progress-wrap { opacity: 1; pointer-events: auto; }
    .task-progress-btn.empty { color: var(--ink-3); }
    .task-progress-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 6px 14px;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: transparent;
      color: var(--ink-2);
      font-size: 12px;
      font-family: 'Noto Sans SC', sans-serif;
      cursor: pointer;
      min-width: 56px;
      transition: border-color .15s, background .15s;
    }
    .task-progress-btn.progress-pill {
      position: relative;
      overflow: hidden;
    }
    .task-progress-btn .progress-pill-fill {
      position: absolute;
      left: 0;
      top: 0;
      bottom: 0;
      background: #E7E0D4;
      border-radius: 6px 0 0 6px;
    }
    .task-progress-btn .progress-pill-text {
      position: relative;
      z-index: 1;
      color: var(--ink);
      font-weight: 500;
    }
    .task-progress-btn:hover { border-color: var(--ink-3); }
    .task-progress-btn.progress-done {
      cursor: default;
      pointer-events: none;
      opacity: 1;
      background: transparent;
      border-color: #E5E5E5;
    }
    .task-progress-btn.progress-done .progress-pill-fill {
      display: none;
    }
    .task-progress-btn.progress-done .progress-pill-text {
      color: #B8B8B8;
    }
    .task-progress-dropdown {
      display: none;
      position: absolute;
      top: 100%;
      right: 0;
      margin-top: 4px;
      padding: 4px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      box-shadow: var(--shadow);
      z-index: 10;
      flex-direction: column;
      gap: 4px;
      max-height: 200px;
      overflow-y: auto;
      scrollbar-width: none;
      -ms-overflow-style: none;
    }
    .task-progress-dropdown::-webkit-scrollbar { display: none; }
    .task-progress-wrap.is-open .task-progress-dropdown { display: none; }
    .task-progress-opt {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 8px 14px;
      border: none;
      border-radius: 8px;
      font-size: 12px;
      font-family: 'Noto Sans SC', sans-serif;
      cursor: pointer;
      white-space: nowrap;
      transition: opacity .15s, background .15s;
      position: relative;
      overflow: hidden;
      background: #F0EDE8;
      min-width: 72px;
    }
    .task-progress-opt:hover { background: #E8E4DE; opacity: 1; }
    .task-progress-opt .progress-pill-fill {
      position: absolute;
      left: 0;
      top: 0;
      bottom: 0;
      background: #E7E0D4;
      border-radius: 8px 0 0 8px;
    }
    .task-progress-opt .progress-pill-text {
      position: relative;
      z-index: 1;
      color: var(--ink-2);
      font-weight: 500;
    }

    /* work type - tag + dropdown */
    .task-worktype-wrap { position: relative; transition: opacity .15s; }
    .task-table tbody tr .task-worktype-wrap { opacity: 0; pointer-events: none; }
    .task-table tbody tr:hover .task-worktype-wrap,
    .task-table tbody tr.task-worktype-selected .task-worktype-wrap { opacity: 1; pointer-events: auto; }
    .task-worktype-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 6px 14px;
      border-radius: 6px;
      font-size: 12px;
      font-family: 'Noto Sans SC', sans-serif;
      cursor: pointer;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--ink-2);
      transition: all .15s;
      min-width: 56px;
      white-space: nowrap;
    }
    .task-worktype-btn.empty { color: var(--ink-3); }
    .task-worktype-btn:hover { opacity: .9; }
    .task-worktype-dropdown {
      display: none;
      position: absolute;
      top: 100%;
      left: 0;
      margin-top: 4px;
      padding: 6px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      box-shadow: var(--shadow);
      z-index: 10;
      flex-direction: column;
      gap: 4px;
      min-width: 100px;
      max-height: 200px;
      overflow-y: auto;
      scrollbar-width: none;
      -ms-overflow-style: none;
    }
    .task-worktype-dropdown::-webkit-scrollbar { display: none; }
    .task-worktype-wrap.is-open .task-worktype-dropdown { display: none; }
    #dropdownPortal { position: fixed; z-index: 9999; top: 0; left: 0; pointer-events: none; }
    #dropdownPortal > * { pointer-events: auto; }
    .task-progress-dropdown-portal,
    .task-worktype-dropdown-portal {
      position: fixed;
      display: flex;
      flex-direction: column;
      gap: 4px;
      transform-origin: top center;
      animation: dropdownExpand 0.22s cubic-bezier(0.2, 0.9, 0.3, 1);
    }
    .task-progress-dropdown-portal {
      padding: 10px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      box-shadow: var(--shadow);
      max-height: 200px;
      overflow-y: auto;
      scrollbar-width: none;
      -ms-overflow-style: none;
      width: max-content;
      min-width: 72px;
      gap: 8px;
    }
    .task-progress-dropdown-portal::-webkit-scrollbar { display: none; }
    .task-worktype-dropdown-portal {
      padding: 10px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      box-shadow: var(--shadow);
      min-width: 100px;
      width: max-content;
      max-height: 200px;
      overflow-y: auto;
      scrollbar-width: none;
      -ms-overflow-style: none;
      gap: 8px;
    }
    .task-worktype-dropdown-portal::-webkit-scrollbar { display: none; }
    .task-worktype-opt {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 14px;
      border: none;
      border-radius: 8px;
      font-size: 12px;
      font-family: 'Noto Sans SC', sans-serif;
      cursor: pointer;
      text-align: left;
      transition: opacity .15s, background .15s;
      gap: 8px;
    }
    .task-worktype-opt:hover { opacity: .9; }
    .task-worktype-opt .wt-del {
      flex-shrink: 0;
      width: 18px;
      height: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 4px;
      background: transparent;
      color: inherit;
      opacity: .6;
      font-size: 14px;
      line-height: 1;
      cursor: pointer;
      transition: opacity .15s, background .15s;
    }
    .task-worktype-opt .wt-del:hover { opacity: 1; background: rgba(0,0,0,.08); }
    .task-worktype-opt.task-worktype-null { background: #F0EDE8; color: var(--ink-3); }
    .task-worktype-opt.task-worktype-null:hover { background: #E8E4DE; }
    .task-worktype-add { color: var(--ink-2) !important; background: #F5F3EF !important; border: 1px dashed var(--border) !important; }
    .task-worktype-add:hover { background: #EDE9E3 !important; }
    .task-worktype-add-input {
      padding: 8px 14px;
      border: none;
      border-radius: 8px;
      font-size: 12px;
      font-family: 'Noto Sans SC', sans-serif;
      background: #F5F3EF;
      color: var(--ink-2);
      outline: none;
      width: 100%;
      box-sizing: border-box;
    }
    .task-worktype-add-input::placeholder { color: var(--ink-3); }

    /* task inline edit */
    .task-edit-input {
      flex: 1;
      border: none;
      border-bottom: 1.5px solid var(--accent);
      background: transparent;
      font-size: 14px;
      font-family: 'Noto Sans SC', sans-serif;
      color: var(--ink);
      outline: none;
      padding: 1px 0 3px;
    }
    .task-text { cursor: text; }

    /* report editable */
    .report-box[contenteditable="true"] {
      outline: none;
      cursor: text;
      caret-color: var(--accent);
    }
    .report-box[contenteditable="true"]:focus {
      border-left-color: var(--accent);
    }
    .edit-hint {
      font-size: 11px;
      color: var(--ink-3);
      margin-top: 10px;
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .empty-tip {
      text-align: center;
      padding: 80px 24px;
      color: var(--ink-3);
      font-size: 14px;
      line-height: 1.9;
    }

    .stats-row {
      display: flex;
      gap: 14px;
      padding: 12px 0 0;
      border-top: 1px solid var(--border);
      margin-top: 4px;
    }
    .stat { font-size: 12px; color: var(--ink-3); }
    .stat b { color: var(--ink); font-weight: 500; }
    .stat .hi { color: var(--accent); font-weight: 500; }

    /* Week picker */
    .week-picker {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 12px;
    }
    .wk-label {
      flex: 1;
      text-align: center;
      font-size: 13px;
      font-weight: 500;
      color: var(--ink);
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 6px 10px;
    }

    .gen-btn {
      width: 100%;
      padding: 11px 0;
      border: none;
      border-radius: 7px;
      background: var(--accent);
      color: #fff;
      font-size: 14px;
      font-family: 'Noto Sans SC', sans-serif;
      font-weight: 500;
      cursor: pointer;
      transition: background .15s, opacity .15s;
    }
    .gen-btn:hover { background: #b05130; }
    .gen-btn:disabled { opacity: .6; cursor: not-allowed; }

    /* ── Report output ── */
    .report-output-wrap { margin-top: 16px; }
    .report-box {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 18px 20px;
      font-size: 14px;
      line-height: 1.9;
      white-space: pre-wrap;
      color: var(--ink);
      display: none;
      animation: fadeUp .22s ease;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .rp-pane { display: none; flex-direction: column; gap: 80px; padding-top: 20px; }
    .rp-pane.active { display: flex; }
    .rp-block { display: flex; flex-direction: column; gap: 6px; }
    .rp-title { font-weight: 600; font-size: 15px; color: var(--ink); }
    .rp-placeholder { display: flex; flex-direction: column; gap: 4px; position: relative; }
    .rp-placeholder .pl-num { font-size: 13px; color: #D4CBBf; font-weight: 500; }
    .rp-placeholder.loading > * { visibility: hidden; }
    .rp-placeholder.loading::before { content: '正在生成中…'; position: absolute; top: 0; left: 0; font-size: 13px; color: var(--ink-3); font-style: italic; }
    .rp-content { display: none; white-space: pre-wrap; font-size: 13px; line-height: 1.55; color: var(--ink); outline: none; }
    .rp-content.filled { display: block; }
    .report-footer {
      display: none;
      justify-content: space-between;
      align-items: center;
      margin-top: 10px;
    }
    .copy-btn {
      padding: 7px 16px;
      border: 1.5px solid var(--green);
      border-radius: 6px;
      background: transparent;
      color: var(--green);
      font-size: 13px;
      font-family: 'Noto Sans SC', sans-serif;
      font-weight: 500;
      cursor: pointer;
      transition: all .15s;
    }
    .copy-btn:hover { background: var(--green); color: #fff; }
    .error-box {
      display: none;
      margin-top: 12px;
      padding: 12px 14px;
      border-radius: 8px;
      background: #FEF2F2;
      border: 1px solid #FECACA;
      color: #B91C1C;
      font-size: 13px;
      line-height: 1.55;
    }

    /* ── Feedback button ── */
    /* ── Onboarding guide ── */
    .onboard-guide {
      position: fixed;
      top: 148px;
      left: 48px;
      z-index: 8000;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.4s ease;
    }
    .onboard-guide.visible { opacity: 1; pointer-events: auto; }
    .onboard-guide.hiding { opacity: 0; }
    .onboard-label {
      font-family: 'Noto Serif SC', serif;
      font-size: 17px;
      font-weight: 600;
      color: var(--ink);
      white-space: nowrap;
      margin-bottom: 6px;
    }
    .onboard-arrow {
      width: 90px;
      height: 54px;
      overflow: visible;
    }
    @keyframes onboard-bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(5px); }
    }
    .onboard-arrow { animation: onboard-bounce 1.4s ease-in-out infinite; }

    .feedback-btn {
      position: fixed;
      right: 28px;
      bottom: 28px;
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: var(--surface);
      border: 1px solid var(--border);
      box-shadow: none;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: box-shadow .15s, transform .15s;
      z-index: 100;
      color: var(--ink-3);
      font-size: 18px;
    }
    .feedback-btn:hover {
      box-shadow: none;
      transform: translateY(-2px);
      color: var(--ink);
    }

    /* QR popup */
    .qr-overlay {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 200;
    }
    .qr-overlay.open { display: block; }
    .qr-popup {
      position: fixed;
      right: 80px;
      bottom: 28px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      box-shadow: 0 8px 32px rgba(28,23,20,.14);
      padding: 20px;
      text-align: center;
      animation: popUp .18s ease;
    }
    @keyframes popUp {
      from { opacity: 0; transform: scale(.92) translateY(8px); }
      to   { opacity: 1; transform: scale(1) translateY(0); }
    }
    .qr-popup img {
      width: 160px;
      height: 160px;
      display: block;
      border-radius: 6px;
    }
    .qr-popup p {
      margin-top: 10px;
      font-size: 12px;
      color: var(--ink-3);
    }

    /* ── PWA Install button ── */
    .pwa-install-btn {
      display: none;
      align-items: center;
      gap: 6px;
      padding: 6px 12px;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: var(--surface);
      color: var(--ink-2);
      font-size: 12px;
      font-family: 'Noto Sans SC', sans-serif;
      cursor: pointer;
      transition: all .15s;
    }
    .pwa-install-btn.visible { display: flex; }
    .pwa-install-btn:hover {
      border-color: var(--accent);
      color: var(--accent);
      background: var(--accent-bg);
    }
    .pwa-install-btn svg {
      width: 14px;
      height: 14px;
      flex-shrink: 0;
    }

    /* ── Splash page (first visit only) ── */
    .splash-brand {
      position: absolute;
      top: 28px;
      left: 32px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .splash-logo {
      width: 32px;
      height: 32px;
      border-radius: 8px;
    }
    .splash-brand-name {
      font-family: 'Noto Serif SC', serif;
      font-size: 20px;
      font-weight: 700;
      color: var(--ink);
      letter-spacing: -.3px;
    }
    @keyframes splash-fade-up {
      from {
        opacity: 0;
        transform: translateY(24px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
    @keyframes splash-bg-in {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    .splash-page {
      position: fixed;
      inset: 0;
      background: var(--surface);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      animation: splash-bg-in 0.9s ease;
    }
    .splash-page.is-hidden {
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.35s ease;
    }
    .splash-content {
      text-align: center;
      padding: 24px;
    }
    .splash-title {
      font-family: 'Noto Serif SC', serif;
      font-size: 34px;
      font-weight: 700;
      color: var(--ink);
      line-height: 1.4;
      margin-bottom: 20px;
      opacity: 0;
      animation: splash-fade-up 0.9s ease 0.4s forwards;
    }
    .splash-subtitle {
      font-size: 20px;
      color: var(--ink-2);
      line-height: 1.7;
      margin-bottom: 40px;
      white-space: nowrap;
      opacity: 0;
      animation: splash-fade-up 0.9s ease 0.9s forwards;
    }
    .splash-btn {
      display: inline-block;
      padding: 14px 32px;
      background: var(--accent);
      color: #fff;
      font-size: 16px;
      font-family: 'Noto Sans SC', sans-serif;
      font-weight: 500;
      border: none;
      border-radius: var(--radius);
      cursor: pointer;
      transition: background 0.2s, transform 0.15s;
      opacity: 0;
      animation: splash-fade-up 0.9s ease 1.4s forwards;
    }
    .splash-btn:hover {
      background: #b05130;
      transform: translateY(-1px);
    }

    /* ── Main page entrance animation ── */
    @keyframes page-fade-up {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
    .page-entrance {
      opacity: 0;
    }
    body.page-ready .page-entrance {
      animation: page-fade-up 0.8s ease forwards;
    }
    body.page-ready .page-entrance-1 { animation-delay: 0.1s; }
    body.page-ready .page-entrance-2 { animation-delay: 0.25s; }
    body.page-ready .page-entrance-3 { animation-delay: 0.4s; }
    body.page-ready .page-entrance-4 { animation-delay: 0.55s; }
    body.page-ready .page-entrance-5 { animation-delay: 0.7s; }
    body.page-ready .page-entrance-6 { animation-delay: 0.85s; }

    /* ── Mobile responsive ── */
    @media (max-width: 768px) {
      .topbar-inner {
        padding: max(0px, env(safe-area-inset-top)) max(16px, env(safe-area-inset-right)) 0 max(16px, env(safe-area-inset-left));
        height: auto;
        min-height: 56px;
      }
      .app-name { font-size: 18px; }
      .app-desc { font-size: 12px; display: none; }
      .brand-sep { display: none; }
      .app-today video { height: 40px !important; }
      .today-day { font-size: 20px; }
      .today-meta { font-size: 12px; }

      .app {
        padding: 16px 16px 40px;
      }

      .week-strip-inner {
        gap: 2px;
      }
      .ws-item { padding: 4px 2px 3px; }
      .ws-name { font-size: 9px; }
      .ws-num { font-size: 12px; }
      .ws-cnt { font-size: 9px; }

      .app-body {
        grid-template-columns: 1fr;
        gap: 24px;
      }
      .col-left {
        padding-right: 0;
        position: static;
      }
      .col-right {
        padding-left: 0;
        border-left: none;
        padding-top: 20px;
        border-top: 1px solid var(--border);
      }

      .report-section {
        padding-bottom: 24px;
      }
      .report-section + .report-section {
        padding-top: 24px;
      }
      .rs-top {
        flex-direction: column;
        align-items: stretch;
        gap: 12px;
      }
      .rs-gen-btn { align-self: flex-start; }
      .rs-title { font-size: 16px; }

      .splash-content { padding: 20px 16px; }
      .splash-title { font-size: 24px; }
      .splash-subtitle {
        font-size: 16px;
        white-space: normal;
        text-align: center;
      }
      .splash-btn { padding: 12px 24px; font-size: 15px; }

      .task-progress-btn { padding: 5px 10px; font-size: 11px; min-width: 48px; }

      .feedback-btn {
        right: max(16px, env(safe-area-inset-right));
        bottom: max(16px, env(safe-area-inset-bottom));
        width: 40px;
        height: 40px;
      }
      .qr-popup {
        left: 16px;
        right: 16px;
        bottom: 24px;
        margin: 0 auto;
        width: fit-content;
        max-width: 200px;
      }
      .qr-popup img { width: 140px; height: 140px; }
    }

    @media (max-width: 480px) {
      .topbar-inner { padding: 0 12px; }
      .app-today { gap: 12px; }
      .app-today video { height: 36px !important; }
      .today-day { font-size: 18px; }

      .app { padding: 12px 12px 32px; }

      .splash-title { font-size: 20px; }
      .splash-subtitle { font-size: 14px; }
    }
  </style>
</head>
<body>

<!-- Splash page (first visit only) -->
<div class="splash-page" id="splashOverlay">
  <div class="splash-brand">
    <img src="./favicon.png" class="splash-logo" alt="logo" />
    <span class="splash-brand-name">AI 周报</span>
  </div>
  <div class="splash-content">
    <div class="splash-title">🤔 还在为写周报头疼吗?</div>
    <div class="splash-subtitle">正确的工作方式会使你更游刃有余，管理就从日常开始~</div>
    <button class="splash-btn" id="splashBtn">告别迷乱，开启新篇章</button>
  </div>
</div>

<!-- Full-width top bar -->
<div class="topbar-outer page-entrance page-entrance-1">
  <div class="topbar-inner">
    <div class="app-brand">
      <span class="app-name">AI 周报</span>
      <div class="brand-sep"></div>
      <span class="app-desc">记录每日任务，一键生成工作总结</span>
    </div>
    <div class="app-today">
      <button class="pwa-install-btn" id="pwaInstallBtn" title="下载到桌面">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
          <polyline points="7 10 12 15 17 10"/>
          <line x1="12" y1="15" x2="12" y2="3"/>
        </svg>
        下载到桌面
      </button>
      <div style="display:flex;align-items:center;gap:12px;">
        <div class="today-day" id="headerDay"></div>
        <div class="today-meta" id="headerMeta"></div>
      </div>
    </div>
  </div>
</div>

<div class="app">

  <!-- 横向本周导航 -->
  <div class="week-strip-wrap page-entrance page-entrance-2">
    <button class="week-nav-arrow" id="weekNavPrev" onclick="changeViewWeek(-1)">&#8249;</button>
    <div class="week-strip-inner" id="weekSidebar"></div>
    <button class="week-nav-arrow" id="weekNavNext" onclick="changeViewWeek(1)" disabled>&#8250;</button>
  </div>

  <div class="app-body">

    <!-- ── 左列：任务管理 ── -->
    <div class="col-left page-entrance page-entrance-3">
      <div class="card-header">
        <span class="card-label">今日待办</span>
        <div id="statsRow" style="display:none">
          <span class="stat" style="font-size:12px">
            共 <b id="statTotal">0</b> 项 &nbsp;·&nbsp;
            已完成 <span class="hi" id="statDone">0</span> 项 &nbsp;·&nbsp;
            待处理 <b id="statUndone">0</b> 项
          </span>
        </div>
      </div>

      <div class="add-row">
        <input class="task-input" type="text" id="taskInput"
               placeholder="添加待办事项，按回车确认…"
               onkeydown="if(event.key==='Enter') addTask()" />
        <button class="add-btn" onclick="addTask()">+</button>
      </div>

      <div class="task-table-wrap">
        <table class="task-table">
          <thead>
            <tr>
              <th class="col-num">#</th>
              <th class="col-task">任务</th>
              <th class="col-progress">进度</th>
              <th class="col-worktype">工作&业务类型</th>
            </tr>
          </thead>
          <tbody id="taskList"></tbody>
        </table>
      </div>
      <div class="empty-tip" id="emptyTip" style="display:none">
        简短描述你的工作计划，AI 会帮你管理和规划～
      </div>
    </div>

    <!-- ── 中列：日报 + 周报 各独立区块 ── -->
    <div class="col-right">

      <!-- 报告区块（日报/周报切换） -->
      <div class="report-section page-entrance page-entrance-4">
        <div class="rs-top">
          <div class="rs-info">
            <div class="report-type-tabs">
              <button type="button" class="report-tab active" data-type="daily" onclick="switchReportType('daily')">日报</button>
              <button type="button" class="report-tab" data-type="weekly" onclick="switchReportType('weekly')">周报</button>
              <button type="button" class="report-tab" data-type="monthly" onclick="switchReportType('monthly')">月报</button>
            </div>
            <div class="rs-meta-wrap">
              <div class="rs-meta rs-meta-daily" id="dailyReportMeta"></div>
              <div class="rs-meta rs-meta-weekly" id="reportWeekMeta" style="display:none">
                <button class="week-nav-btn" onclick="changeReportWeek(-1)">&#8249;</button>
                <span id="reportWeekLabel"></span>
                <button class="week-nav-btn" id="reportWeekNextBtn" onclick="changeReportWeek(1)">&#8250;</button>
              </div>
              <div class="rs-meta rs-meta-monthly" id="reportMonthMeta" style="display:none">
                <button class="week-nav-btn" onclick="changeReportMonth(-1)">&#8249;</button>
                <span id="reportMonthLabel"></span>
                <button class="week-nav-btn" id="reportMonthNextBtn" onclick="changeReportMonth(1)">&#8250;</button>
              </div>
            </div>
          </div>
          <button class="rs-gen-btn" id="reportGenBtn" onclick="generateReport(reportType)">生成日报</button>
        </div>
        <div class="rs-output">
          <div id="rpDaily" class="rp-pane active" data-type="daily">
            <div class="rp-block">
              <div class="rp-title">今日完成</div>
              <div id="rpContentDaily1" class="rp-content" contenteditable="true" spellcheck="false"></div>
              <div id="rpPlaceholderDaily1" class="rp-placeholder">
                <span class="pl-num">1.</span><span class="pl-num">2.</span><span class="pl-num">3.</span><span class="pl-num" style="color:#E0D8CF">···</span>
              </div>
            </div>
            <div class="rp-block">
              <div class="rp-title">明日计划</div>
              <div id="rpContentDaily2" class="rp-content" contenteditable="true" spellcheck="false"></div>
              <div id="rpPlaceholderDaily2" class="rp-placeholder">
                <span class="pl-num">1.</span><span class="pl-num">2.</span><span class="pl-num">3.</span><span class="pl-num" style="color:#E0D8CF">···</span>
              </div>
            </div>
            <div id="reportErrorDaily" class="error-box" style="display:none"></div>
            <div id="reportFooterDaily" class="report-footer" style="display:none">
              <span class="edit-hint">点击内容可直接编辑</span>
              <button class="copy-btn" onclick="copyReport('daily')">一键复制</button>
            </div>
          </div>
          <div id="rpWeekly" class="rp-pane" data-type="weekly">
            <div class="rp-block">
              <div class="rp-title">本周完成</div>
              <div id="rpContentWeekly1" class="rp-content" contenteditable="true" spellcheck="false"></div>
              <div id="rpPlaceholderWeekly1" class="rp-placeholder">
                <span class="pl-num">1.</span><span class="pl-num">2.</span><span class="pl-num">3.</span><span class="pl-num" style="color:#E0D8CF">···</span>
              </div>
            </div>
            <div class="rp-block">
              <div class="rp-title">下周计划</div>
              <div id="rpContentWeekly2" class="rp-content" contenteditable="true" spellcheck="false"></div>
              <div id="rpPlaceholderWeekly2" class="rp-placeholder">
                <span class="pl-num">1.</span><span class="pl-num">2.</span><span class="pl-num">3.</span><span class="pl-num" style="color:#E0D8CF">···</span>
              </div>
            </div>
            <div id="reportErrorWeekly" class="error-box" style="display:none"></div>
            <div id="reportFooterWeekly" class="report-footer" style="display:none">
              <span class="edit-hint">点击内容可直接编辑</span>
              <button class="copy-btn" onclick="copyReport('weekly')">一键复制</button>
            </div>
          </div>
          <div id="rpMonthly" class="rp-pane" data-type="monthly">
            <div class="rp-block">
              <div class="rp-title">本月完成</div>
              <div id="rpContentMonthly1" class="rp-content" contenteditable="true" spellcheck="false"></div>
              <div id="rpPlaceholderMonthly1" class="rp-placeholder">
                <span class="pl-num">1.</span><span class="pl-num">2.</span><span class="pl-num">3.</span><span class="pl-num" style="color:#E0D8CF">···</span>
              </div>
            </div>
            <div class="rp-block">
              <div class="rp-title">下月计划</div>
              <div id="rpContentMonthly2" class="rp-content" contenteditable="true" spellcheck="false"></div>
              <div id="rpPlaceholderMonthly2" class="rp-placeholder">
                <span class="pl-num">1.</span><span class="pl-num">2.</span><span class="pl-num">3.</span><span class="pl-num" style="color:#E0D8CF">···</span>
              </div>
            </div>
            <div id="reportErrorMonthly" class="error-box" style="display:none"></div>
            <div id="reportFooterMonthly" class="report-footer" style="display:none">
              <span class="edit-hint">点击内容可直接编辑</span>
              <button class="copy-btn" onclick="copyReport('monthly')">一键复制</button>
            </div>
          </div>
        </div>
      </div>

    </div>

  </div>
</div>

<!-- Onboarding guide -->
<div class="onboard-guide" id="onboardGuide">
  <div class="onboard-label">试着添加你的第一个日程吧～</div>
  <svg class="onboard-arrow" viewBox="0 0 90 54" fill="none" xmlns="http://www.w3.org/2000/svg">
    <path d="M4 4 C20 4, 80 4, 80 46" stroke="var(--ink-2)" stroke-width="1.8" stroke-dasharray="5 4" stroke-linecap="round" fill="none"/>
    <polyline points="72,40 80,48 88,40" stroke="var(--ink-2)" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  </svg>
</div>

<!-- Feedback button -->
<button class="feedback-btn page-entrance page-entrance-6" onclick="toggleQR(event)" title="问题反馈">
  <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
    <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
  </svg>
</button>

<!-- Dropdown portal (renders outside table to avoid clipping) -->
<div id="dropdownPortal"></div>

<!-- QR overlay -->
<div class="qr-overlay" id="qrOverlay" onclick="closeQR()">
  <div class="qr-popup" onclick="event.stopPropagation()">
    <img src="./二维码.png" alt="反馈二维码" />
    <p>扫码联系，反馈问题</p>
  </div>
</div>

<script>
// ── Splash page (first visit only) ───────────────────────────────────────────
(function() {
  const SPLASH_KEY = 'report_tool_splash_seen';
  const splashPage = document.getElementById('splashOverlay');
  const btn = document.getElementById('splashBtn');

  function maybeShowOnboard() {
    var guide = document.getElementById('onboardGuide');
    if (!guide) return;
    var allTasks = {};
    try { allTasks = JSON.parse(localStorage.getItem('report_tool_tasks')) || {}; } catch(e) {}
    var hasAnyTask = Object.values(allTasks).some(function(arr) { return arr && arr.length > 0; });
    if (hasAnyTask) return;
    setTimeout(function() { guide.classList.add('visible'); }, 600);
  }

  if (localStorage.getItem(SPLASH_KEY)) {
    splashPage.style.display = 'none';
    document.body.classList.add('page-ready');
    maybeShowOnboard();
  } else {
    btn.onclick = function() {
      localStorage.setItem(SPLASH_KEY, '1');
      document.body.classList.add('page-ready');
      splashPage.classList.add('is-hidden');
      setTimeout(function() {
        splashPage.style.display = 'none';
        maybeShowOnboard();
      }, 350);
    };
  }
})();

function dismissOnboard() {
  var guide = document.getElementById('onboardGuide');
  if (!guide || !guide.classList.contains('visible')) return;
  guide.classList.add('hiding');
  setTimeout(function() { guide.style.display = 'none'; }, 400);
}

// ── Constants ──────────────────────────────────────────────────────────────
const STORAGE_KEY    = 'report_tool_tasks';
const SETTINGS_KEY   = 'report_tool_settings';
const WORK_TYPES_KEY = 'report_tool_work_types';
const PROGRESS_OPTS  = [25, 50, 75];
const DEFAULT_WORK_TYPES = [];
const WORK_TYPE_COLORS = [
  { bg: '#E8F0E8', fg: '#2d6a4a' },
  { bg: '#E8EEF5', fg: '#3d6a9e' },
  { bg: '#FDF0E8', fg: '#c85d3a' },
  { bg: '#F0E8F5', fg: '#6b4a8e' },
  { bg: '#F5E8EE', fg: '#9e4a6b' },
  { bg: '#E8F5F2', fg: '#2d7a6a' },
  { bg: '#F5F0E8', fg: '#8e7a4a' },
  { bg: '#E8E8F5', fg: '#4a4a9e' },
];

function getWorkTypeColor(name) {
  if (!name) return null;
  const idx = workTypes.indexOf(name);
  if (idx < 0) return WORK_TYPE_COLORS[0];
  const c = WORK_TYPE_COLORS[idx % WORK_TYPE_COLORS.length];
  return c;
}

const DEFAULT_SETTINGS = {
  apiKey:      '',  // Set your API key in settings or copy from 大模型api.example.md
  apiEndpoint: 'https://api.openai.com/v1',
  apiModel:    'gpt-4o',
};

// ── State ──────────────────────────────────────────────────────────────────
let currentDate         = todayStr();
let viewWeekOffset      = 0;
let reportWeekOffset    = 0;
let reportMonthOffset   = 0;
let editingTaskId       = null;
let openProgressTaskId   = null;
let openProgressDate    = null;
let openWorkTypeTaskId  = null;
let openWorkTypeDate    = null;
let addingWorkType      = false;
let reportType          = 'daily';
let tasks            = loadTasks();
let settings         = loadSettings();
let workTypes        = loadWorkTypes();
loadApiConfig();  // Load API key from 大模型api.md (provided by product owner)

// ── Helpers ────────────────────────────────────────────────────────────────
function todayStr() {
  const d = new Date();
  return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
}

function pad(n) { return String(n).padStart(2, '0'); }

function parseDateStr(str) {
  const [y, m, d] = str.split('-').map(Number);
  return new Date(y, m - 1, d);
}

function formatDateShort(str) {
  const [y, m, d] = str.split('-').map(Number);
  return `${m}月${d}日`;
}

function formatDateFull(str) {
  const [y, m, d] = str.split('-');
  const days = ['周日','周一','周二','周三','周四','周五','周六'];
  return `${y}年${m}月${d}日 ${days[parseDateStr(str).getDay()]}`;
}

function getWeekDates(dateStr) {
  const date = parseDateStr(dateStr);
  const dow  = date.getDay();
  const mon  = new Date(date);
  mon.setDate(date.getDate() - (dow === 0 ? 6 : dow - 1));
  return Array.from({length: 7}, (_, i) => {
    const t = new Date(mon);
    t.setDate(mon.getDate() + i);
    return `${t.getFullYear()}-${pad(t.getMonth()+1)}-${pad(t.getDate())}`;
  });
}

function getReportWeekDates() {
  const base = new Date();
  base.setDate(base.getDate() + reportWeekOffset * 7);
  const str = `${base.getFullYear()}-${pad(base.getMonth()+1)}-${pad(base.getDate())}`;
  return getWeekDates(str);
}

// ── Storage ────────────────────────────────────────────────────────────────
function loadTasks() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || {}; } catch { return {}; }
}
function saveTasks() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(tasks));
}
function loadSettings() {
  try {
    const s = JSON.parse(localStorage.getItem(SETTINGS_KEY));
    return Object.assign({}, DEFAULT_SETTINGS, s);
  } catch { return Object.assign({}, DEFAULT_SETTINGS); }
}

function loadWorkTypes() {
  try {
    const w = JSON.parse(localStorage.getItem(WORK_TYPES_KEY));
    return Array.isArray(w) ? w : [];
  } catch { return []; }
}

function saveWorkTypes() {
  localStorage.setItem(WORK_TYPES_KEY, JSON.stringify(workTypes));
}

async function loadApiConfig() {
  try {
    const resp = await fetch('./大模型api.md');
    if (!resp.ok) return;
    const text = await resp.text();
    const keyMatch = text.match(/API_KEY\s*=\s*["']([^"']+)["']/);
    const endpointMatch = text.match(/API_ENDPOINT\s*=\s*["']([^"']+)["']/);
    if (keyMatch && keyMatch[1] && keyMatch[1] !== 'your-api-key-here') {
      settings.apiKey = keyMatch[1].trim();
    }
    if (endpointMatch && endpointMatch[1]) {
      settings.apiEndpoint = endpointMatch[1].trim();
    }
  } catch (_) {}
}

// ── Task CRUD ──────────────────────────────────────────────────────────────
function addTask() {
  const input = document.getElementById('taskInput');
  const text  = input.value.trim();
  if (!text) return;
  if (!tasks[currentDate]) tasks[currentDate] = [];
  tasks[currentDate].push({ id: Date.now(), text, done: false, progress: null, workType: null, createdAt: new Date().toISOString() });
  saveTasks();
  input.value = '';
  dismissOnboard();
  renderAll();
}

function toggleTask(date, id) {
  const t = (tasks[date] || []).find(t => t.id === id);
  if (t) {
    t.done = !t.done;
    t.progress = t.done ? 100 : (t.progress !== null ? t.progress : 25);
    saveTasks();
  }
  renderAll();
}

function setTaskProgress(date, id, val) {
  const t = (tasks[date] || []).find(t => t.id === id);
  if (!t) return;
  if (val === '' || val === null) return;
  t.progress = parseInt(val, 10);
  t.done = t.progress === 100;
  openProgressTaskId = null;
  openProgressDate = null;
  saveTasks();
  renderAll();
}

function toggleProgressDropdown(date, id, e) {
  e.stopPropagation();
  if (openProgressTaskId === id && openProgressDate === date) {
    openProgressTaskId = null;
    openProgressDate = null;
  } else {
    openProgressTaskId = id;
    openProgressDate = date;
    openWorkTypeTaskId = null;
    openWorkTypeDate = null;
  }
  renderTaskList();
}

function closeProgressDropdown() {
  openProgressTaskId = null;
  openProgressDate = null;
  renderTaskList();
}

function setTaskWorkType(date, id, val) {
  const t = (tasks[date] || []).find(t => t.id === id);
  if (!t) return;
  t.workType = val || null;
  openWorkTypeTaskId = null;
  openWorkTypeDate = null;
  saveTasks();
  renderAll();
}

function toggleWorkTypeDropdown(date, id, e) {
  e.stopPropagation();
  if (openWorkTypeTaskId === id && openWorkTypeDate === date) {
    openWorkTypeTaskId = null;
    openWorkTypeDate = null;
  } else {
    openWorkTypeTaskId = id;
    openWorkTypeDate = date;
    openProgressTaskId = null;
    openProgressDate = null;
  }
  renderTaskList();
}

function closeWorkTypeDropdown() {
  openWorkTypeTaskId = null;
  openWorkTypeDate = null;
  renderTaskList();
}

function addWorkType(e, date, id) {
  e.stopPropagation();
  addingWorkType = true;
  renderTaskList();
  setTimeout(function() {
    var inp = document.querySelector('.task-worktype-add-input');
    if (inp) { inp.focus(); }
  }, 50);
}
function confirmAddWorkType(name) {
  name = (name || '').trim();
  addingWorkType = false;
  if (name) {
    if (!workTypes.includes(name)) {
      workTypes.push(name);
      saveWorkTypes();
    }
    if (openWorkTypeDate && openWorkTypeTaskId) setTaskWorkType(openWorkTypeDate, openWorkTypeTaskId, name);
  }
  renderAll();
}
function cancelAddWorkType() {
  addingWorkType = false;
  renderTaskList();
}
function handleAddWorkTypeBlur(inp) {
  var v = (inp && inp.value || '').trim();
  if (v) confirmAddWorkType(v);
  else cancelAddWorkType();
}

function removeWorkType(name) {
  if (!name) return;
  var idx = workTypes.indexOf(name);
  if (idx < 0) return;
  workTypes.splice(idx, 1);
  saveWorkTypes();
  Object.keys(tasks).forEach(function(date) {
    tasks[date] = tasks[date].map(function(t) {
      if (t.workType === name) t.workType = null;
      return t;
    });
  });
  saveTasks();
  closeWorkTypeDropdown();
  renderAll();
}

function getTaskProgress(t) {
  return t.progress ?? (t.done ? 100 : 0);
}

function deleteTask(date, id) {
  if (!tasks[date]) return;
  tasks[date] = tasks[date].filter(t => t.id !== id);
  saveTasks();
  renderAll();
}

function startTaskEdit(id) {
  editingTaskId = id;
  renderTaskList();
}

function saveTaskEdit(date, id, newText) {
  const text = newText.trim();
  if (text) {
    const t = (tasks[date] || []).find(t => t.id === id);
    if (t) { t.text = text; saveTasks(); }
  }
  editingTaskId = null;
  renderAll();
}

function cancelTaskEdit() {
  editingTaskId = null;
  renderTaskList();
}

// ── Render ─────────────────────────────────────────────────────────────────
function renderAll() {
  renderTopbar();
  renderTaskList();
  renderWeekSidebar();
  renderReportWeekLabel();
  renderReportMonthLabel();
}

function renderTopbar() {
  const today = new Date();
  const days  = ['周日','周一','周二','周三','周四','周五','周六'];
  document.getElementById('headerDay').textContent  = pad(today.getDate());
  document.getElementById('headerMeta').innerHTML   =
    `${today.getFullYear()}年${pad(today.getMonth()+1)}月<br>${days[today.getDay()]}`;
}

function renderTaskList() {
  const list     = document.getElementById('taskList');
  const empty    = document.getElementById('emptyTip');
  const statsRow = document.getElementById('statsRow');
  const dayTasks = tasks[currentDate] || [];

  document.getElementById('dailyReportMeta').textContent  = `当前日期：${formatDateShort(currentDate)}`;

  if (!dayTasks.length) {
    list.innerHTML         = '';
    empty.style.display    = 'block';
    statsRow.style.display = 'none';
    document.querySelector('.task-table-wrap').style.display = 'none';
    return;
  }

  empty.style.display    = 'none';
  statsRow.style.display = 'block';
  document.querySelector('.task-table-wrap').style.display = 'block';

  const doneCount = dayTasks.filter(t => t.done || getTaskProgress(t) === 100).length;
  document.getElementById('statTotal').textContent  = dayTasks.length;
  document.getElementById('statDone').textContent   = doneCount;
  document.getElementById('statUndone').textContent = dayTasks.length - doneCount;

  window._portalProgressData = null;
  window._portalWorkTypeData = null;
  list.innerHTML = dayTasks.map((t, idx) => {
    const isEditing = t.id === editingTaskId;
    const hasSelected = t.progress != null && (PROGRESS_OPTS.includes(t.progress) || t.progress === 100);
    const rowCls = (hasSelected ? ' task-progress-selected' : '') + (t.workType ? ' task-worktype-selected' : '');
    const displayProg = t.done ? 100 : (getTaskProgress(t) <= 25 ? 25 : getTaskProgress(t) <= 50 ? 50 : 75);
    const btnContent = t.done
      ? '<span class="progress-pill-fill" style="width:100%"></span><span class="progress-pill-text">已完成</span>'
      : (hasSelected
        ? '<span class="progress-pill-fill" style="width:' + displayProg + '%"></span><span class="progress-pill-text">' + displayProg + '%</span>'
        : '进度');
    const btnCls = (hasSelected || t.done) ? 'task-progress-btn progress-pill' : 'task-progress-btn empty';
    const progressDisabled = t.done;
    const isProgOpen = !progressDisabled && openProgressTaskId === t.id && openProgressDate === currentDate;
    const progWrapCls = 'task-progress-wrap' + (isProgOpen ? ' is-open' : '');
    const progOptsHtml = PROGRESS_OPTS.map(function(p) {
      return '<button type="button" class="task-progress-opt" onclick="setTaskProgress(\'' + currentDate + '\',' + t.id + ',' + p + ')"><span class="progress-pill-fill" style="width:' + p + '%"></span><span class="progress-pill-text">' + p + '%</span></button>';
    }).join('');
    if (isProgOpen) window._portalProgressData = { html: progOptsHtml, triggerId: currentDate + '-' + t.id };
    const workTypeLabel = t.workType || '选择类型';
    const isWtOpen = openWorkTypeTaskId === t.id && openWorkTypeDate === currentDate;
    const wtWrapCls = 'task-worktype-wrap' + (isWtOpen ? ' is-open' : '');
    const wtOptsHtml = '<button type="button" class="task-worktype-opt task-worktype-null" onclick="setTaskWorkType(\'' + currentDate + '\',' + t.id + ',null)">—</button>' + workTypes.map(function(w, wi) {
      var c = WORK_TYPE_COLORS[wi % WORK_TYPE_COLORS.length];
      var wEsc = (w + '').replace(/\\/g, '\\\\').replace(/'/g, "\\'");
      return '<button type="button" class="task-worktype-opt" style="background:' + c.bg + ';color:' + c.fg + '" onclick="setTaskWorkType(\'' + currentDate + '\',' + t.id + ',\'' + wEsc + '\')"><span>' + escHtml(w) + '</span><span class="wt-del" onclick="event.stopPropagation();removeWorkType(\'' + wEsc + '\')" title="删除类型">×</span></button>';
    }).join('') + (addingWorkType && isWtOpen ? '<input type="text" class="task-worktype-add-input" placeholder="输入类型名称" onblur="handleAddWorkTypeBlur(this)" onkeydown="if(event.key===\'Enter\'){confirmAddWorkType(this.value);event.preventDefault()}if(event.key===\'Escape\'){cancelAddWorkType();event.preventDefault()}">' : '<button type="button" class="task-worktype-opt task-worktype-add" onclick="addWorkType(event,\'' + currentDate + '\',' + t.id + ')">+ 添加类型</button>');
    if (isWtOpen) window._portalWorkTypeData = { html: wtOptsHtml, triggerId: currentDate + '-' + t.id };
    const textPart = isEditing
      ? `<input class="task-edit-input" value="${escHtml(t.text)}"
               onblur="saveTaskEdit('${currentDate}', ${t.id}, this.value)"
               onkeydown="if(event.key==='Enter'){this.blur()} if(event.key==='Escape'){cancelTaskEdit()}"
         />`
      : `<span class="task-text ${t.done ? 'done' : ''}"
               onclick="startTaskEdit(${t.id})">${escHtml(t.text)}</span>`;
    return `
    <tr class="${rowCls}">
      <td class="col-num">${idx + 1}</td>
      <td class="col-task">
        <div class="task-cell-inner">
          <label class="task-check">
            <input type="checkbox" ${t.done ? 'checked' : ''}
                   onchange="toggleTask('${currentDate}', ${t.id})" />
            <div class="check-box">
              <svg width="11" height="8" viewBox="0 0 11 8" fill="none">
                <path d="M1 3.5L4 6.5L10 1" stroke="white" stroke-width="1.8"
                      stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            </div>
          </label>
          ${textPart}
          <button class="del-btn" onclick="deleteTask('${currentDate}', ${t.id})" title="删除">×</button>
        </div>
      </td>
      <td class="col-progress">
        <div class="${progWrapCls}">
          <button type="button" class="${btnCls}${progressDisabled ? ' progress-done' : ''}" data-progress-trigger="${currentDate}-${t.id}" ${progressDisabled ? '' : 'onclick="toggleProgressDropdown(\'' + currentDate + '\',' + t.id + ', event)"'}>${btnContent}</button>
          <div class="task-progress-dropdown">${progOptsHtml}</div>
        </div>
      </td>
      <td class="col-worktype">
        <div class="${wtWrapCls}">
          <button type="button" class="task-worktype-btn ${!t.workType ? 'empty' : ''}" data-worktype-trigger="${currentDate}-${t.id}" ${t.workType ? 'style="border-color:' + (getWorkTypeColor(t.workType).fg) + ';color:' + (getWorkTypeColor(t.workType).fg) + '"' : ''} onclick="toggleWorkTypeDropdown('${currentDate}', ${t.id}, event)">${escHtml(workTypeLabel)}</button>
          <div class="task-worktype-dropdown">${wtOptsHtml}</div>
        </div>
      </td>
    </tr>`;
  }).join('');

  if (editingTaskId !== null) {
    const inp = document.querySelector('.task-edit-input');
    if (inp) { inp.focus(); inp.select(); }
  }
  setTimeout(renderDropdownPortal, 0);
}

function renderDropdownPortal() {
  var portal = document.getElementById('dropdownPortal');
  portal.innerHTML = '';
  var pd = window._portalProgressData;
  var wd = window._portalWorkTypeData;
  if (pd) {
    var btn = document.querySelector('[data-progress-trigger="' + pd.triggerId + '"]');
    if (btn) {
      var r = btn.getBoundingClientRect();
      var el = document.createElement('div');
      el.className = 'task-progress-dropdown task-progress-dropdown-portal';
      el.style.cssText = 'left:' + r.left + 'px;top:' + (r.bottom + 4) + 'px;';
      el.innerHTML = pd.html;
      portal.appendChild(el);
    }
  }
  if (wd) {
    var btn = document.querySelector('[data-worktype-trigger="' + wd.triggerId + '"]');
    if (btn) {
      var r = btn.getBoundingClientRect();
      var el = document.createElement('div');
      el.className = 'task-worktype-dropdown task-worktype-dropdown-portal';
      el.style.cssText = 'left:' + r.left + 'px;top:' + (r.bottom + 4) + 'px;';
      el.innerHTML = wd.html;
      portal.appendChild(el);
    }
  }
}

function getViewWeekDates() {
  const base = new Date();
  base.setDate(base.getDate() + viewWeekOffset * 7);
  const str = `${base.getFullYear()}-${pad(base.getMonth()+1)}-${pad(base.getDate())}`;
  return getWeekDates(str);
}

function renderWeekSidebar() {
  const weekDates = getViewWeekDates();
  const today     = todayStr();
  const labels    = ['一','二','三','四','五','六','日'];
  document.getElementById('weekSidebar').innerHTML = weekDates.map((date, i) => {
    const count = (tasks[date] || []).length;
    let cls = 'ws-item';
    if (date === currentDate) cls += ' is-viewing';
    else if (date === today)  cls += ' is-today';
    if (count > 0) cls += ' has-tasks';
    return `<div class="${cls}" onclick="jumpToDate('${date}')">
      <div class="ws-name">周${labels[i]}</div>
      <div class="ws-num">${+date.slice(8)}</div>
      <div class="ws-cnt">${count > 0 ? count + '项' : '—'}</div>
    </div>`;
  }).join('');
  document.getElementById('weekNavNext').disabled = viewWeekOffset >= 0;
}

function changeViewWeek(delta) {
  viewWeekOffset = Math.min(0, viewWeekOffset + delta);
  renderWeekSidebar();
}

function renderReportWeekLabel() {
  const dates = getReportWeekDates();
  const start = dates[0], end = dates[6];
  const [sy, sm, sd] = start.split('-').map(Number);
  const [ey, em, ed] = end.split('-').map(Number);
  const thisYear = new Date().getFullYear();
  let label;
  if (sy === ey && sy === thisYear) {
    label = `${sm}月${sd}日 — ${em}月${ed}日`;
  } else if (sy === ey) {
    label = `${sy}年 ${sm}月${sd}日 — ${em}月${ed}日`;
  } else {
    label = `${sy}年${sm}月${sd}日 — ${ey}年${em}月${ed}日`;
  }
  document.getElementById('reportWeekLabel').textContent = label;
  // disable "下一周" if already at current week
  document.getElementById('reportWeekNextBtn').disabled = reportWeekOffset >= 0;
}

// ── Date Navigation ────────────────────────────────────────────────────────
function changeDate(delta) {
  const d = parseDateStr(currentDate);
  d.setDate(d.getDate() + delta);
  currentDate = `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
  renderAll();
}

function jumpToToday() {
  currentDate = todayStr();
  renderAll();
}

function jumpToDate(date) {
  currentDate = date;
  renderAll();
}

function changeReportWeek(delta) {
  reportWeekOffset = Math.min(0, reportWeekOffset + delta);
  renderReportWeekLabel();
}

function getReportMonthDates() {
  const base = new Date();
  base.setDate(1);
  base.setMonth(base.getMonth() + reportMonthOffset);
  const y = base.getFullYear(), m = base.getMonth() + 1;
  const daysInMonth = new Date(y, m, 0).getDate();
  return Array.from({ length: daysInMonth }, (_, i) => `${y}-${pad(m)}-${pad(i + 1)}`);
}

function renderReportMonthLabel() {
  const dates = getReportMonthDates();
  const [y, m] = dates[0].split('-').map(Number);
  const thisYear = new Date().getFullYear();
  document.getElementById('reportMonthLabel').textContent = y === thisYear ? `${m}月` : `${y}年${m}月`;
  document.getElementById('reportMonthNextBtn').disabled = reportMonthOffset >= 0;
}

function changeReportMonth(delta) {
  reportMonthOffset = Math.min(0, reportMonthOffset + delta);
  renderReportMonthLabel();
}

function switchReportType(type) {
  reportType = type;
  document.querySelectorAll('.report-tab').forEach(function(btn) {
    btn.classList.toggle('active', btn.dataset.type === type);

var PLACEHOLDER_HTML = '<span class="pl-num">1.</span><span class="pl-num">2.</span><span class="pl-num">3.</span><span class="pl-num" style="color:#E0D8CF">···</span>';

function rpSetLoading(type) {
  var prefix = type === 'daily' ? 'Daily' : type === 'weekly' ? 'Weekly' : 'Monthly';
  ['1','2'].forEach(function(n) {
    var c = document.getElementById('rpContent' + prefix + n);
    var p = document.getElementById('rpPlaceholder' + prefix + n);
    if (c && p) {
      if (c.classList.contains('filled')) {
        p.style.minHeight = c.offsetHeight + 'px';
      }
      c.textContent = '';
      c.classList.remove('filled');
      p.classList.add('loading');
      p.style.display = '';
    }
  });
}

function rpSetError(type, msg) {
  var prefix = type === 'daily' ? 'Daily' : type === 'weekly' ? 'Weekly' : 'Monthly';
  ['1','2'].forEach(function(n) {
    var p = document.getElementById('rpPlaceholder' + prefix + n);
    if (p) { p.classList.remove('loading'); p.style.minHeight = ''; }
  });
  var errEl = document.getElementById('reportError' + prefix);
  if (errEl) { errEl.textContent = '生成失败：' + msg; errEl.style.display = 'block'; }
}

function renderReportStructure(type, part1, part2) {
  var compact = function(s) {
    return (s || '')
      .replace(/\n{3,}/g, '\n\n')
      .replace(/^- /gm, '• ')
      .trim();
  };
  var prefix = type === 'daily' ? 'Daily' : type === 'weekly' ? 'Weekly' : 'Monthly';
  var vals = [compact(part1), compact(part2)];
  ['1','2'].forEach(function(n, i) {
    var c = document.getElementById('rpContent' + prefix + n);
    var p = document.getElementById('rpPlaceholder' + prefix + n);
    if (!c || !p) return;
    if (vals[i]) {
      c.textContent = vals[i];
      c.classList.add('filled');
      p.style.minHeight = '';
      p.style.display = 'none';
    } else {
      c.textContent = '';
      c.classList.remove('filled');
      p.style.minHeight = '';
      p.style.display = '';
      p.classList.remove('loading');
    }
  });
}

async function generateReport(type) {
  var prefix   = type === 'daily' ? 'Daily' : type === 'weekly' ? 'Weekly' : 'Monthly';
  var errorEl  = document.getElementById('reportError' + prefix);
  var footerEl = document.getElementById('reportFooter' + prefix);
  var genBtn   = document.getElementById('reportGenBtn');

  if (errorEl) errorEl.style.display = 'none';
  if (footerEl) footerEl.style.display = 'none';
  rpSetLoading(type);
  genBtn.disabled = true;

  const taskData = type === 'daily' ? buildDailyData() : type === 'weekly' ? buildWeeklyData() : buildMonthlyData();
  const prompt   = type === 'daily' ? buildDailyPrompt(taskData) : type === 'weekly' ? buildWeeklyPrompt(taskData) : buildMonthlyPrompt(taskData);

  try {
    const text = await callLLM(prompt);
    const parts = text.split(REPORT_SECTION_DELIM);
    const p1 = (parts[0] || '').trim();
    const p2 = (parts.length > 1 ? parts.slice(1).join(REPORT_SECTION_DELIM).trim() : '');
    renderReportStructure(type, p1, p2);
    if (footerEl) footerEl.style.display = 'flex';
  } catch (err) {
    rpSetError(type, err.message);
  } finally {
    genBtn.disabled = false;
  }
}

function buildDailyData() {
  const day = tasks[currentDate] || [];
  return {
    date:   currentDate,
    done:   day.filter(t => getTaskProgress(t) > 0).map(t => ({ text: t.text, progress: getTaskProgress(t), workType: t.workType })),
    undone: day.filter(t => getTaskProgress(t) < 100).map(t => ({ text: t.text, progress: getTaskProgress(t), workType: t.workType })),
  };
}

function buildWeeklyData() {
  const dates    = getReportWeekDates();
  const allTasks = dates.flatMap(date => (tasks[date] || []).map(t => ({ ...t, date })));
  return {
    weekStart: dates[0],
    weekEnd:   dates[6],
    done:      allTasks.filter(t => getTaskProgress(t) > 0).map(t => ({ text: t.text, date: t.date, progress: getTaskProgress(t), workType: t.workType })),

  return `You are a professional workplace assistant. Generate a polished, natural-sounding daily work report in Chinese.

Date: ${date}
Today's work (tasks with any progress):
${doneStr}
Tasks not yet 100% (to plan for tomorrow):
${undoneStr}

Output format (Chinese only, no extra explanation):
Output exactly TWO parts. Between the two parts, output exactly this line (nothing else on that line):
${REPORT_SECTION_DELIM}

Part 1 - Today's completed work:

async function callLLM(prompt) {
  const { apiKey: key, apiModel: model } = settings;
  // Try Vercel API first (when deployed, OPENAI_API_KEY is in env)
  try {
    const apiResp = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ prompt, model }),
    });
    const apiData = await apiResp.json().catch(() => ({}));
    if (apiResp.ok && apiData.content) return apiData.content;
    if (apiResp.status === 404) { /* fall through to direct */ }
    else throw new Error(apiData.error || `请求失败 (${apiResp.status})`);
  } catch (e) {
    const msg = e.message || '';
    if (msg.includes('Failed to fetch') || msg.includes('NetworkError') || msg.includes('Load failed')) {
      // No /api/chat (e.g. static host), fall through to direct call
    } else {
      throw e;
    }
  }
  // Fallback: direct OpenAI (local with 大模型api.md)
  if (!key) throw new Error('未配置 API Key。请在 Vercel 设置 OPENAI_API_KEY，或本地添加 大模型api.md');
  const resp = await fetch('https://api.openai.com/v1/chat/completions', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${key}` },
    body: JSON.stringify({ model, messages: [{ role: 'user', content: prompt }], temperature: 0.7 }),
  });
  if (!resp.ok) {
    const body = await resp.text();
    throw new Error(`请求失败 (${resp.status})：${body}`);
  }
  const data = await resp.json();
  return data.choices?.[0]?.message?.content || '未返回内容。';
}

}

// ── PWA Install ───────────────────────────────────────────────────────────
(function() {
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('./sw.js').catch(function() {});
  }
  var installBtn = document.getElementById('pwaInstallBtn');
  var deferredPrompt;
  window.addEventListener('beforeinstallprompt', function(e) {
    e.preventDefault();
    deferredPrompt = e;
    if (installBtn) installBtn.classList.add('visible');
  });
  if (installBtn) {
    installBtn.onclick = function() {
      if (!deferredPrompt) return;
      deferredPrompt.prompt();
      deferredPrompt.userChoice.then(function(r) {
        if (r.outcome === 'accepted') installBtn.classList.remove('visible');
        deferredPrompt = null;
      });
    };
  }
  if (window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone) {
    if (installBtn) installBtn.style.display = 'none';
  }
})();
